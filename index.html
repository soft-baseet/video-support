<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مركز دعم البسيط سوفت</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Cairo', sans-serif;
  background: #F4F6FC;
  min-height: 100vh;
  direction: rtl;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px 16px;
}

.wrap { width: 100%; max-width: 480px; }

/* LOGO */
.logo-area { text-align: center; margin-bottom: 32px; }
.logo-icon {
  width: 80px; height: 80px;
  background: linear-gradient(135deg, #151f50, #2D3B7A);
  border-radius: 20px;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 36px; margin-bottom: 16px;
  box-shadow: 0 8px 32px rgba(30,43,107,0.25);
}
.logo-area h1 { font-size: 22px; font-weight: 800; color: #1E2B6B; margin-bottom: 6px; }
.logo-area p { font-size: 13px; color: #5a6080; }

/* CARDS */
.cards { display: flex; flex-direction: column; gap: 14px; }

.card {
  background: white;
  border-radius: 16px;
  border: 1.5px solid #DDE1F0;
  padding: 20px;
  display: flex; align-items: center; gap: 16px;
  text-decoration: none;
  transition: all 0.2s;
  box-shadow: 0 2px 12px rgba(30,43,107,0.07);
  cursor: pointer;
}
.card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 28px rgba(30,43,107,0.15);
  border-color: #2D3B7A;
}
.card:active { transform: translateY(0); }

.card-icon {
  width: 56px; height: 56px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; flex-shrink: 0;
}
.card-icon.blue { background: #E8EBF7; }
.card-icon.green { background: #E8F5E9; }

.card-text { flex: 1; }
.card-title { font-size: 16px; font-weight: 800; color: #1a1f36; margin-bottom: 4px; }
.card-desc { font-size: 12px; color: #5a6080; line-height: 1.4; }

.card-arrow { font-size: 20px; color: #aab0cc; flex-shrink: 0; }

/* FOOTER */
.footer { margin-top: 32px; text-align: center; font-size: 11px; color: #aab0cc; font-weight: 500; }
</style>
</head>
<body>

<div class="wrap">
  <div class="logo-area">
    <div class="logo-icon">⚡</div>
    <h1>مركز دعم البسيط</h1>
    <p>اختر القسم الذي تحتاجه</p>
  </div>

  <div class="cards">
    <a class="card" href="albaseet-support_2.html">
      <div class="card-icon blue">🎬</div>
      <div class="card-text">
        <div class="card-title">مكتبة الفيديوهات</div>
        <div class="card-desc">شروحات البسيط - ابحث عن الموضوع وأرسل الرابط للعميل</div>
      </div>
      <span class="card-arrow">←</span>
    </a>

    <a class="card" href="downloads.html">
      <div class="card-icon green">📁</div>
      <div class="card-text">
        <div class="card-title">التعاريف والبرامج</div>
        <div class="card-desc">تحميل التعاريف والبرامج والملفات المطلوبة</div>
      </div>
      <span class="card-arrow">←</span>
    </a>
  </div>

  <div class="footer">للموظفين فقط · البسيط سوفت</div>
</div>

</body>
</html>
